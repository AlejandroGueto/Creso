<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏛️ El Códice de Creso: Escape Room Filológico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Mono&display=swap');

        :root {
            --font-display: 'Cinzel', serif;
            --font-body: 'Lora', serif;
            --font-mono: 'Space Mono', monospace;
        }

        body {
            font-family: var(--font-body);
            background-color: #020617; /* slate-950 */
            color: #cbd5e1; /* slate-300 */
        }

        h1, h2, h3, h4, .font-display { font-family: var(--font-display); }
        .font-mono { font-family: var(--font-mono); }

        /* Estilos tabla griega estilo Codex proporcionado */
        .table-greek th {
            background-color: #0f172a; /* slate-900 */
            color: #94a3b8; /* slate-400 */
            font-family: var(--font-display);
            letter-spacing: 0.05em;
            padding: 0.75rem 0.5rem;
            border-bottom: 2px solid #334155; /* slate-700 */
        }
        .table-greek td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid #1e293b; /* slate-800 */
            font-family: 'Palatino Linotype', serif;
            font-size: 1.1em;
        }
        .table-greek tr:hover td { background-color: #0f172a; }
        .highlight { color: #38bdf8; font-weight: bold; } /* cyan-400 */
        .highlight-alt { color: #fb923c; font-weight: bold; } /* orange-400 */
        
        /* Scrollbar premium */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 4px; } /* amber-600 */
        
        .greek-text-block {
            font-family: 'Palatino Linotype', serif;
            font-size: 1.6em;
            line-height: 1.5;
            background-color: rgba(253, 246, 227, 0.05);
            border-left: 4px solid #b45309; /* amber-700 */
        }
    </style>
</head>
<body class="antialiased">

<div id="app" class="min-h-screen flex flex-col">
    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-feather="book-open" class="text-amber-500 w-8 h-8"></i>
                <h1 class="text-3xl font-bold text-slate-100 tracking-wider">EL CÓDICE DE CRESO</h1>
            </div>
            <button onclick="toggleCodex()" class="flex items-center gap-2 bg-amber-600 hover:bg-amber-500 text-slate-950 px-5 py-2.5 rounded-xl font-bold transition-all shadow-lg text-sm">
                <i data-feather="key" class="w-4 h-4"></i>
                CONSULTAR CÓDICE (GRAMÁTICA Y CULTURA)
            </button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto p-6 md:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <div id="game-area" class="lg:col-span-3 space-y-8">
            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-xl">
                <div class="flex items-center gap-4 mb-6 border-b border-slate-800 pb-5">
                    <div class="bg-amber-950/50 p-4 rounded-full border border-amber-700">
                        <i data-feather="flag" class="text-amber-400 w-8 h-8"></i>
                    </div>
                    <div>
                        <h2 class="text-sm font-mono text-amber-500 uppercase tracking-widest">Misión Actual</h2>
                        <h3 id="stage-title" class="text-2xl font-bold text-slate-100">Cargando...</h3>
                    </div>
                </div>
                <div id="stage-narrative" class="text-slate-300 space-y-4 leading-relaxed">
                    </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-40 h-40 bg-amber-600/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
                
                <h4 class="font-display text-xl text-slate-200 mb-6 flex items-center gap-3">
                    <i data-feather="puzzle" class="text-cyan-400"></i>
                    Desencripta el Fragmento Griego
                </h4>

                <div id="greek-text-container" class="greek-text-block text-slate-100 p-6 rounded-2xl mb-8 shadow-inner border border-slate-800">
                    </div>

                <div class="bg-slate-950 border border-slate-800 rounded-2xl p-6 space-y-4">
                    <p id="puzzle-question" class="text-amber-300 font-medium text-lg"></p>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="user-input" placeholder="Escribe tu respuesta aquí (puedes omitir acentos)..." class="flex-grow bg-slate-800 border border-slate-700 text-slate-100 p-4 rounded-xl focus:ring-2 focus:ring-amber-500 focus:border-amber-500 font-mono text-sm outline-none">
                        <button onclick="checkAnswer()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-8 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-lg">
                            <i data-feather="arrow-right" class="w-5 h-5"></i>
                            VALIDAR
                        </button>
                    </div>
                    <p id="feedback" class="text-sm font-mono pt-2 min-h-[20px]"></p>
                </div>
            </div>
        </div>

        <aside class="space-y-6">
            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl sticky top-28">
                <h4 class="font-display text-lg text-slate-200 mb-5 pb-4 border-b border-slate-800 tracking-wide">Mapa del Destino</h4>
                <nav id="progress-map" class="space-y-3 font-mono text-sm">
                    </nav>
            </div>
        </aside>
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 p-6 mt-12 text-center text-slate-500 text-sm font-mono">
        Escape Room Filológico v2.0 Premium | Basado en Heródoto | Para 1º Bachillerato Griego.
    </footer>

    <div id="codex-modal" class="fixed inset-0 bg-slate-950/80 z-[100] hidden backdrop-blur-sm opacity-0 transition-opacity duration-300 flex justify-end" onclick="closeCodexOuter(event)">
        <div class="w-full max-w-5xl h-full bg-slate-900 border-l border-slate-700 shadow-2xl flex flex-col transform translate-x-full transition-transform duration-300" onclick="event.stopPropagation()">
            <header class="p-6 border-b border-slate-700 flex items-center justify-between sticky top-0 bg-slate-900 z-10">
                <div class="flex items-center gap-3">
                    <i data-feather="book-open" class="text-amber-500 w-7 h-7"></i>
                    <h2 class="text-2xl font-bold text-slate-100 tracking-wider">EL CÓDICE DE CRESO</h2>
                </div>
                <button onclick="toggleCodex()" class="text-slate-500 hover:text-white p-2 rounded-full hover:bg-slate-800">
                    <i data-feather="x" class="w-6 h-6"></i>
                </button>
            </header>
            
            <div class="flex-grow overflow-y-auto p-8 space-y-12">
                <div id="codex-content"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Inicializar iconos Feather
    feather.replace();

    // ==========================================
    // ESTRUCTURA DE DATOS PRINCIPAL: CODEX_DATA
    // (Complejidad y estilo clonados del ejemplo)
    // ==========================================
    const CODEX_DATA = [
        {
            id: "cultura", category: "Contexto Cultural", title: "1. Lidia, Solón y la Riqueza", icon: "flag",
            content: `
                <div class="space-y-6 text-slate-300 leading-relaxed">
                  <h4 class="font-bold text-amber-400 text-xl border-b border-slate-700 pb-3">El Imperio de Lidia y la Invención de la Moneda</h4>
                  <p>Lidia (Asia Menor, actual Turquía) fue una superpotencia en el s. VI a.C. Su capital, Sardes, era un crisol cultural entre Grecia y Oriente. Gracias a los depósitos del río Pactolo, Creso acumuló una riqueza legendaria, convirtiendo el metal precioso, el <strong>electró</strong> (aleación natural de oro y plata), en las primeras monedas acuñadas de la historia con sello real (los *creseidas*), revolucionando la economía mundial.</p>
                  
                  <div class="grid md:grid-cols-2 gap-4 mt-4 font-body">
                    <div class="bg-amber-950/20 border-l-4 border-amber-600 p-5 rounded-r-xl">
                      <h5 class="font-bold text-amber-500 mb-2 text-lg">Solón de Atenas</h5>
                      <p class="text-sm">El gran legislador ateniense, tras sus reformas, viajó por el mundo. Heródoto ficcionaliza su encuentro con Creso en Sardes. Solón representa la sabiduría tradicional griega (*sophrosyne*): la moderación frente a la desmesura asiática.</p>
                    </div>
                    <div class="bg-blue-950/20 border-l-4 border-blue-500 p-5 rounded-r-xl">
                      <h5 class="font-bold text-blue-400 mb-2 text-lg">Híbris y Némesis</h5>
                      <p class="text-sm">Creso comete <strong>Híbris</strong> (Ὕβρις, arrogancia extrema) al creerse el hombre más feliz (ὄλβιος) del mundo por su oro. Solón le advierte: nadie sabe su destino hasta su muerte. Este pecado atrae la <strong>Némesis</strong> (Νέμεσις), el castigo divino que restablece el equilibrio.</p>
                    </div>
                  </div>

                  <h4 class="font-bold text-purple-400 text-xl border-b border-slate-700 pb-3 mt-8">El Oráculo de Delfos</h4>
                  <p class="text-sm mb-4">La religiosidad de Creso fue inmensa. Envió tesoros fabulosos a Delfos para consultar si debía atacar a Ciro el Persa. El Oráculo, regido por Apolo a través de la Pitia, dio su famosa respuesta ambigua. Creso interpretó lo que quería oír, omitiendo la prudencia.</p>
                </div>
            `
        },
        {
            id: "nominal_1", category: "Morfología Nominal", title: "2. Casos, Artículo y Declinaciones", icon: "layers",
            content: `
                <div class="space-y-8 text-sm text-slate-300 font-body">
                  <div>
                    <h4 class="font-bold text-amber-400 text-xl border-b border-slate-700 pb-2 mb-4 tracking-wide">El Artículo y las Funciones Sintácticas</h4>
                    <p class="mb-3 text-slate-400">En griego, el orden de las palabras es libre. El <strong>Caso</strong> (desinencia) determina la función. El <strong>Artículo Determinado</strong> es clave: nos dice el género, número y caso de la palabra que acompaña, incluso si esta es un adjetivo o participio sustantivado.</p>
                    <ul class="space-y-2 bg-slate-900/50 p-4 rounded-xl border border-slate-700 font-mono text-xs shadow-inner">
                      <li><strong class="text-blue-400 text-base">Nominativo (ὁ, ἡ, τό):</strong> Sujeto y Atributo. <span class="text-slate-500 italic">(Creso gobierna Lidia)</span>.</li>
                      <li><strong class="text-emerald-400 text-base">Acusativo (τόν, τήν, τό):</strong> Complemento Directo. <span class="text-slate-500 italic">(Muestra mucho oro)</span>.</li>
                      <li><strong class="text-purple-400 text-base">Genitivo (τοῦ, τῆς, τοῦ):</strong> Complemento del Nombre (Posesión, Origen). <span class="text-slate-500 italic">(La riqueza del rey)</span>.</li>
                      <li><strong class="text-orange-400 text-base">Dativo (τῷ, τῇ, τῷ):</strong> Complemento Indirecto e Instrumental. <span class="text-slate-500 italic">(Habló al adivino)</span>.</li>
                    </ul>
                  </div>

                  <div class="overflow-x-auto bg-slate-950 p-4 rounded-xl border border-slate-700 shadow-inner">
                    <h5 class="font-bold text-blue-300 text-center mb-3 uppercase tracking-widest text-xs font-display">Tercera Declinación (Temas en Oclusiva)</h5>
                    <p class="text-xs text-slate-400 mb-4 px-2">Creso, en griego, es <strong>Κροῖσος</strong> (2ª declinación), pero muchos términos culturales o religiosos claves pertenecen a la 3ª atemática (como *basileus* o *mántis*). Aquí vemos los temas en oclusiva (gutural y labial):</p>
                    <table class="table-greek w-full whitespace-nowrap text-center text-xs">
                      <thead>
                        <tr><th>Caso</th><th>Gutural Fem (ἡ φλόξ, llama)</th><th>Gutural Masc (ὁ κόραξ)</th><th>Labial Masc (ὁ γύψ, buitre)</th></tr>
                      </thead>
                      <tbody>
                        <tr><td class="font-bold text-slate-500 font-mono">Nom Sg</td><td>φλ<span class="highlight">όξ</span> (γ+ς)</td><td>κόραξ</td><td>γύψ</td></tr>
                        <tr><td class="font-bold text-slate-500 font-mono">Acus Sg</td><td>φλόγ-<span class="highlight">α</span></td><td>κόρακ-<span class="highlight">α</span></td><td>γύπ-<span class="highlight">α</span></td></tr>
                        <tr><td class="font-bold text-slate-500 font-mono">Gen Sg</td><td>φλογ-<span class="highlight">ός</span></td><td>κόρακ-<span class="highlight">ος</span></td><td>γύπ-<span class="highlight">ος</span></td></tr>
                        <tr><td class="font-bold text-slate-500 font-mono">Dat Sg</td><td>φλογ-<span class="highlight">ί</span></td><td>κόρακ-<span class="highlight">ι</span></td><td>γύπ-<span class="highlight">ι</span></td></tr>
                        <tr class="border-t border-slate-700"><td class="font-bold text-slate-500 font-mono">Nom Pl</td><td>φλόγ-<span class="highlight">ες</span></td><td>κόρακ-<span class="highlight">ες</span></td><td>γύπ-<span class="highlight">ες</span></td></tr>
                        <tr><td class="font-bold text-slate-500 font-mono">Gen Pl</td><td>φλογ-<span class="highlight">ῶν</span></td><td>κοράκ-<span class="highlight">ων</span></td><td>γυπ-<span class="highlight">ῶν</span></td></tr>
                      </tbody>
                    </table>
                  </div>
                </div>
            `
        },
        {
            id: "nominal_2", category: "Morfología Nominal", title: "3. Adjetivos y Pronombres (Interrog./Indef.)", icon: "star",
            content: `
                <div class="space-y-6 text-sm text-slate-300 font-body">
                  <h4 class="font-bold text-amber-400 text-xl border-b border-slate-700 pb-2 tracking-wide">Adjetivos de 1ª Clase (2-1-2)</h4>
                  <p>Concuerdan en GNC. Siguen la 2ª declinación para Masc. y Neutro, y la 1ª para Femenino. Creso se consideraba el hombre más "feliz" (ὄλβιος, -α, -ον).</p>
                  
                  <div class="bg-slate-950 p-4 rounded-xl border border-slate-700 shadow-inner overflow-x-auto">
                    <table class="table-greek w-full whitespace-nowrap text-center text-xs mb-4">
                      <thead><tr><th>Caso/Numb</th><th>Masc (2ª)</th><th>Fem (1ª -η)</th><th>Neutro (2ª)</th></tr></thead>
                      <tbody>
                        <tr><td class="font-bold text-slate-500 font-mono">Nom Sg</td><td>ὄλβι-<strong class="text-blue-400">ος</strong></td><td>ὀλβί-<strong class="text-pink-400">α</strong> (impura)</td><td>ὄλβι-<strong class="text-emerald-400">ον</strong></td></tr>
                        <tr><td class="font-bold text-slate-500 font-mono">Acus Pl</td><td>ὀλβί-<strong class="text-blue-400">ους</strong></td><td>ὀλβί-<strong class="text-pink-400">ας</strong></td><td>ὄλβι-<strong class="text-emerald-400">α</strong></td></tr>
                      </tbody>
                    </table>
                  </div>

                  <h4 class="font-bold text-cyan-400 text-xl border-b border-slate-700 pb-2 mt-6 tracking-wide">Pronombres: Interrogativo e Indefinido</h4>
                  <p>Diferenciarlos es crucial en griego. Solón hace preguntas fatídicas a Creso.</p>
                  
                  <div class="grid md:grid-cols-2 gap-4">
                    <div class="bg-cyan-950/20 border-l-4 border-cyan-500 p-5 rounded-r-xl font-mono text-xs">
                      <h5 class="font-bold text-cyan-300 mb-2 text-lg font-display">Interrogativo (Quis?)</h5>
                      <p class="text-sm font-body mb-3">Tienen acento agudo siempre en la primera sílaba (τίς o τί). Traducen "¿quién?", "¿qué?", "¿cuál?". </p>
                      <p><strong class="text-cyan-400">Nom Sg (M/F):</strong> τίς ἐστιν; <span class="italic text-slate-500">(¿Quién es?)</span></p>
                      <p><strong class="text-cyan-400">Nom Sg (N):</strong> τί τοῦτό ἐστι; <span class="italic text-slate-500">(¿Qué es esto?)</span></p>
                    </div>
                    <div class="bg-slate-900 border-l-4 border-slate-600 p-5 rounded-r-xl font-mono text-xs shadow-inner">
                      <h5 class="font-bold text-slate-400 mb-2 text-lg font-display">Indefinido (Aliquis)</h5>
                      <p class="text-sm font-body mb-3">Son enclíticos (generalmente sin acento) o llevan acento en la última sílaba. Traducen "alguno", "un cierto", "alguien".</p>
                      <p><strong class="text-slate-400">Nom Sg (M/F):</strong> ἄνθρωπός τις <span class="italic text-slate-500">(un cierto hombre)</span></p>
                      <p><strong class="text-slate-400">Nom Sg (N):</strong> δῶρόν τι <span class="italic text-slate-500">(algún regalo)</span></p>
                    </div>
                  </div>
                </div>
            `
        },
        {
            id: "verbal", category: "Morfología Verbal", title: "4. Tiempos de Pasado (Aoristo y Voz Media)", icon: "zap",
            content: `
                <div class="space-y-6 text-sm text-slate-300 font-body leading-relaxed">
                  <h4 class="font-bold text-amber-400 text-xl border-b border-slate-700 pb-2 tracking-wide">La Voz Media y los Verbos Contractos</h4>
                  <p>Creso se "paga" (*medio*) sus propios ejércitos. La <strong>Voz Media</strong> indica que el sujeto realiza la acción con un interés especial para sí mismo o es el beneficiario directo.</p>
                  <p>Los <strong>Verbos Contractos</strong> (-εω, -αω, -οω) sufren cambios en presente al unir la vocal del tema con la desinencia. Solón advierte: "μηδένα πρὸ τοῦ τέλους ὄλβιον **κάλει**" (no *consideres* [imperativo de *kaléo*] a nadie feliz...).</p>

                  <div class="bg-slate-950 p-4 rounded-xl border border-slate-700 shadow-inner overflow-x-auto">
                    <h5 class="font-bold text-purple-300 text-center mb-3 uppercase tracking-widest text-xs font-display">Aoristo de Indicativo (Activo y Medio)</h5>
                    <p class="text-xs text-slate-400 mb-4 px-2">El <strong>Aoristo</strong> expresa una acción puntual y pasada, desvinculada del presente (como el pretérito perfecto simple). Lleva <strong>Aumento (ε-)</strong>. El modelo sigmático añade -σα-.</p>
                    <table class="table-greek w-full whitespace-nowrap text-center text-xs">
                      <thead><tr><th>Persona</th><th>Activo (ἔλυσα, desaté)</th><th>Medio (ἐλυσάμην, desaté para mí)</th></tr></thead>
                      <tbody>
                        <tr><td class="font-bold text-slate-500 font-mono">1ª Sg</td><td>ε-λυσά-<strong class="highlight">μην</strong></td><td><strong class="highlight-alt">ε-λυσ</strong>-ά-<strong class="highlight-alt">μην</strong></td></tr>
                        <tr><td class="font-bold text-slate-500 font-mono">2ª Sg</td><td>ε-λυσά-<strong class="highlight">ς</strong></td><td><strong class="highlight-alt">ε-λύσ</strong>-ω (σ+ο+desinencia medio)</td></tr>
                        <tr><td class="font-bold text-slate-500 font-mono">3ª Sg</td><td>ε-λυσά-<strong class="highlight">ε (ν)</strong></td><td><strong class="highlight-alt">ε-λύσ</strong>-α-<strong class="highlight-alt">το</strong></td></tr>
                        <tr class="border-t border-slate-700"><td class="font-bold text-slate-500 font-mono">3ª Pl</td><td>ε-λυσά-<strong class="highlight">ν</strong></td><td><strong class="highlight-alt">ε-λύσ</strong>-α-<strong class="highlight-alt">ντο</strong></td></tr>
                      </tbody>
                    </table>
                  </div>
                </div>
            `
        }
    ];

    // ==========================================
    // DATOS DE LAS FASES DEL JUEGO
    // ==========================================
    const STAGES_DATA = [
        {
            id: 0,
            title: "Fase I: Sardes y el Pecado de Híbris",
            narrative: `
                <p>Estás en el Gran Salón del Trono en Sardes. Creso, rodeado de creseidas de electró y joyas fabulosas, acaba de mostrar todo su Oîkos al sabio Solón. El rey ludio está henchido de orgullo. Espera que Solón, el famoso ateniense, valide su estatus.</p>
                <p class="border-l-2 border-amber-700 pl-4 text-slate-400">A diferencia de la Ilíada, lineal, o la Odisea, estructuralmente compleja, Heródoto narra la historia de Creso como una tragedia ética. Creso, cegado por la riqueza, está a punto de cometer un error filológico y vital.</p>
                <p>Lee la pregunta que Creso lanza al sabio y desencripta el adjetivo que está usando para describirse.</p>
            `,
            greekText: `
                <strong class="text-amber-500">ΚΡΟΙΣΟΣ λέγει·</strong> "Σόλων, <strong>τίς</strong> ἐστι πάντων <strong>ὄλβιος</strong>; ἐγὼ γὰρ ἔχω πολὺν χρυσόν".
            `,
            question: "Creso pregunta: '¿Quién es el más [...] de todos?'. Desencripta el ADJETIVO de 1ª clase, en Nominativo Masc. Singular, que usa para 'próspero/feliz'.",
            correctAnswer: "ολβιος",
            type: "vocabulario"
        },
        {
            id: 1,
            title: "Fase II: Delfos y la Ambigüedad Fatal",
            narrative: `
                <p>La Némesis ha comenzado. Creso, asustado por el ascenso de Ciro el Grande, envía fabulosas ofrendas a Delfos, regido por Zeus Xenios como garante de la Xenía. El Oráculo, la Pitia, da su respuesta en hexámetros dactílicos, un ritmo estricto idéntico al del canto oral de Homero.</p>
                <p class="border-l-2 border-purple-700 pl-4 text-slate-400">Heródoto, usando Mêtis (astucia práctica), narra cómo Creso interpretó erróneamente el oráculo debido a su Híbris. Para los griegos, el oráculo revela la verdad, pero requiere inteligencia para ser descifrado.</p>
                <p>Creso comete un error filológico. Desencripta el DEMOSTRATIVO del fragmento.</p>
            `,
            greekText: `
                <strong class="text-purple-400">O ΜΑΝΤΙΣ τῷ βασιλεῖ ἔλεγεν·</strong> "ἢν τὸν ποταμὸν διαβαίνῃς, μεγάλην ἀρχὴν καταλύσεις". <strong>οὗτος</strong> ὁ λόγος τὸν Κροῖσον ἔπειθε.
            `,
            question: "Heródoto narra: ' [...] mensaje (logos) persuadía a Creso'. Desencripta el PRONOMBRE DEMOSTRATIVO Masc. Singular, tal cual aparece en el texto griego.",
            correctAnswer: "ουτος",
            type: "pronombre"
        },
        {
            id: 2,
            title: "Fase III: La Pira de Ciro y la Revelación",
            narrative: `
                <p>La advertencia de Solón se ha cumplido. Lidia ha colapsado. Creso es prisionero. Ciro el Persa, violando el código ético homérico de la Xenía, ordena quemarlo vivo. Las llamas (*phlox*) comienzan a subir por la pira (*pyrá*). Creso, ante la Némesis inminente, grita: "¡Solón, Solón, Solón!". </p>
                <p class="border-l-2 border-orange-700 pl-4 text-slate-400">Para Creso, la Bíe (fuerza bruta persa) ha vencido, pero su Mêtis despierta en el último momento. Recuerda la sabiduría filológica. Ciro, curioso, ordena detener la pira. Creso ha tenido una revelación interna.</p>
                <p>Heródoto narra la realización interna de Creso. Desencripta el verbo clave del fragmento en voz media.</p>
            `,
            greekText: `
                <strong class="text-orange-500">Ἡ ΠΥΡΑ ἅπτει.</strong> Κροῖσος δὲ <strong>ᾔσθετο</strong> τὴν τοῦ Σόλωνος σοφίαν καὶ ἐγενέτο φίλος αὐτῷ. "ἐγὼ μανθάνω", ἔφη.
            `,
            question: "Heródoto escribe: 'Creso [...] (percibió/se dio cuenta para sí mismo) la sabiduría de Solón'. Desencripta el VERBO clave, en 3ª pers. sg. del Aoristo Medio de Indicativo (deponente).",
            correctAnswer: "ησθετο",
            type: "verbo"
        }
    ];

    // ==========================================
    // LÓGICA DEL JUEGO
    // ==========================================
    let currentStage = 0;

    function renderStage() {
        if (currentStage >= STAGES_DATA.length) {
            showEndGame();
            return;
        }

        const stage = STAGES_DATA[currentStage];
        document.getElementById('stage-title').innerText = stage.title;
        document.getElementById('stage-narrative').innerHTML = stage.narrative;
        document.getElementById('greek-text-container').innerHTML = stage.greekText;
        document.getElementById('puzzle-question').innerText = stage.question;
        document.getElementById('user-input').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('feedback').className = "text-sm font-mono pt-2";
        
        renderProgressMap();
        feather.replace();
    }

    function renderProgressMap() {
        const mapContainer = document.getElementById('progress-map');
        mapContainer.innerHTML = '';
        
        STAGES_DATA.forEach((stage, index) => {
            let statusIcon, statusText, liClass;
            
            if (index < currentStage) {
                statusIcon = 'check-circle'; statusText = '(Superada)'; liClass = 'text-green-400';
            } else if (index === currentStage) {
                statusIcon = 'disc'; statusText = '(En proceso)'; liClass = 'text-amber-300 font-medium';
            } else {
                statusIcon = 'circle'; statusText = '(Bloqueada)'; liClass = 'text-slate-600';
            }

            mapContainer.innerHTML += `
                <li class="flex items-center gap-3 ${liClass}">
                    <i data-feather="${statusIcon}" class="w-4 h-4"></i>
                    Fase ${index + 1}: ${stage.id + 1}
                    <span class="text-xs opacity-60">${statusText}</span>
                </li>
            `;
        });
        feather.replace();
    }

    function renderCodex() {
        const codexContent = document.getElementById('codex-content');
        codexContent.innerHTML = '';
        
        CODEX_DATA.forEach(section => {
            codexContent.innerHTML += `
                <section class="bg-slate-950 p-7 rounded-2xl border border-slate-700 shadow-xl overflow-hidden relative">
                    <div class="absolute -top-10 -right-10 w-40 h-40 bg-slate-800 rounded-full"></div>
                    <div class="flex items-center gap-4 mb-6 border-b border-slate-700 pb-5 relative z-10">
                        <div class="bg-amber-950/40 p-3.5 rounded-full border border-amber-800">
                            <i data-feather="${section.icon}" class="text-amber-400 w-7 h-7"></i>
                        </div>
                        <div>
                            <h3 class="text-sm font-mono text-amber-500 uppercase tracking-widest">${section.category}</h3>
                            <h4 class="text-2xl font-bold text-slate-100 font-display">${section.title}</h4>
                        </div>
                    </div>
                    <div class="relative z-10">
                        ${section.content}
                    </div>
                </section>
            `;
        });
        feather.replace();
    }

    // Normalización robusta de griego para validar respuestas (quita diacríticos e iotas suscritas)
    function normalizeGreek(str) {
        return str.normalize("NFD")
                  .replace(/[\u0300-\u036f]/g, "") // Quita diacríticos (acentos, espíritus)
                  .replace(/\u0345/g, "")          // Quita iota suscrita
                  .toLowerCase()
                  .trim();
    }

    function checkAnswer() {
        const userInput = document.getElementById('user-input').value;
        const normalizedInput = normalizeGreek(userInput);
        const feedback = document.getElementById('feedback');
        
        if (normalizedInput === STAGES_DATA[currentStage].correctAnswer) {
            feedback.innerText = "✓ ¡Filológicamente correcto! Has desencriptado el fragmento.";
            feedback.className = "text-sm font-mono pt-2 text-green-400";
            setTimeout(() => {
                currentStage++;
                renderStage();
            }, 1200);
        } else {
            feedback.innerText = "✗ Error. El Códice guarda la clave para esta función nominal o verbal.";
            feedback.className = "text-sm font-mono pt-2 text-red-400";
        }
    }

    // ==========================================
    // INTERFAZ DE USUARIO Y MODAL
    // ==========================================
    let isCodexOpen = false;

    function toggleCodex() {
        const modal = document.getElementById('codex-modal');
        const modalPanel = modal.querySelector('.transform');
        
        if (!isCodexOpen) {
            modal.classList.remove('hidden');
            renderCodex(); // Cargar datos al abrir
            setTimeout(() => {
                modal.classList.add('opacity-100');
                modalPanel.classList.remove('translate-x-full');
            }, 10);
            document.body.classList.add('overflow-hidden');
            isCodexOpen = true;
        } else {
            modal.classList.remove('opacity-100');
            modalPanel.classList.add('translate-x-full');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
            document.body.classList.remove('overflow-hidden');
            isCodexOpen = false;
        }
    }

    function closeCodexOuter(event) {
        if (isCodexOpen) toggleCodex();
    }

    function showEndGame() {
        const gameArea = document.getElementById('game-area');
        gameArea.innerHTML = `
            <div class="bg-slate-900 border-2 border-amber-600 rounded-3xl p-10 shadow-2xl text-center space-y-6">
                <div class="flex justify-center mb-6">
                    <div class="bg-amber-950 p-6 rounded-full border border-amber-600">
                        <i data-feather="award" class="text-amber-400 w-16 h-16"></i>
                    </div>
                </div>
                <h2 class="text-4xl font-bold text-slate-100 font-display tracking-wider">🏛️ ¡Códec de Creso COMPLETADO! 🏛️</h2>
                <div class="bg-slate-950 p-8 rounded-xl border border-slate-700 text-slate-300 space-y-4 max-w-2xl mx-auto font-body">
                    <p class="text-lg text-amber-300 font-medium">Has dominado la historia de Creso y la Mofología Nominal y Verbal necesaria para 1º de Bachillerato.</p>
                    <p>Al igual que Creso ante Ciro, has comprendido que la verdadera sabiduría no está en el electró (*Phthonos*), sino en ἡ σοφία (la sabiduría). Has navegado por la 3ª declinación, los pronombres interrogativos e indefinidos, los verbos contractos y los complejos Aoristos Medios de Heródoto. ¡Tu Némesis ha sido evitada por la filología!</p>
                </div>
            </div>
        `;
        renderProgressMap();
        feather.replace();
    }

    // Inicializar el juego
    renderStage();
</script>
